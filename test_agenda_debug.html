<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Agenda Debug</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Teste de Debug - Agenda</h1>
        
        <div class="row">
            <div class="col-md-6">
                <h3>Teste de Funções</h3>
                <button class="btn btn-primary mb-2" onclick="testShowQuickAppointment()">
                    Testar showQuickAppointment
                </button>
                <br>
                <button class="btn btn-success mb-2" onclick="testAllFunctions()">
                    Testar Todas as Funções
                </button>
                <br>
                <button class="btn btn-info mb-2" onclick="checkScriptLoading()">
                    Verificar Carregamento
                </button>
            </div>
            
            <div class="col-md-6">
                <h3>Log de Resultados</h3>
                <div id="log" class="border p-3 bg-light" style="height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px;">
                    Aguardando testes...
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <h3>Status das Funções</h3>
                <div id="functionStatus" class="row">
                    <!-- Status será preenchido dinamicamente -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/agenda.js"></script>
    
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-danger' : type === 'success' ? 'text-success' : 'text-info';
            
            logDiv.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function testShowQuickAppointment() {
            log('Testando showQuickAppointment...');
            
            if (typeof window.showQuickAppointment === 'function') {
                try {
                    window.showQuickAppointment();
                    log('✅ showQuickAppointment executada com sucesso', 'success');
                } catch (error) {
                    log(`❌ Erro ao executar showQuickAppointment: ${error.message}`, 'error');
                }
            } else {
                log('❌ showQuickAppointment não está definida', 'error');
            }
        }
        
        function testAllFunctions() {
            log('Testando todas as funções...');
            
            const functions = [
                'showQuickAppointment', 'toggleView', 'applyFilters', 'exportAgenda',
                'showBulkActions', 'editAppointment', 'confirmAppointment', 
                'rescheduleAppointment', 'cancelAppointment', 'toggleSelectAll',
                'bulkConfirm', 'bulkCancel', 'bulkReschedule', 'bulkExport',
                'filterPatientOptions', 'loadAvailableSlots', 'updateDuration',
                'toggleRecurringOptions', 'saveAppointment', 'showNewPatientModal', 'saveNewPatient'
            ];
            
            let successCount = 0;
            let errorCount = 0;
            
            functions.forEach(funcName => {
                if (typeof window[funcName] === 'function') {
                    log(`✅ ${funcName}: OK`, 'success');
                    successCount++;
                } else {
                    log(`❌ ${funcName}: NÃO DEFINIDA`, 'error');
                    errorCount++;
                }
            });
            
            log(`Resumo: ${successCount} funções OK, ${errorCount} funções faltando`, 
                errorCount === 0 ? 'success' : 'error');
        }
        
        function checkScriptLoading() {
            log('Verificando carregamento do script...');
            
            // Verificar se o arquivo foi carregado
            const scripts = document.querySelectorAll('script[src*="agenda.js"]');
            log(`Scripts agenda.js encontrados: ${scripts.length}`);
            
            scripts.forEach((script, index) => {
                log(`Script ${index + 1}: ${script.src}`);
            });
            
            // Verificar se há erros no console
            log('Verifique o console do navegador para erros de JavaScript');
            
            // Verificar se as funções estão disponíveis
            setTimeout(() => {
                log('Verificação após delay...');
                testAllFunctions();
            }, 1000);
        }
        
        // Verificação automática ao carregar
        document.addEventListener('DOMContentLoaded', function() {
            log('Página carregada, verificando funções...');
            
            setTimeout(() => {
                checkScriptLoading();
            }, 500);
        });
        
        // Verificação de erros
        window.addEventListener('error', function(e) {
            log(`Erro JavaScript: ${e.message} em ${e.filename}:${e.lineno}`, 'error');
        });
    </script>
</body>
</html>
