<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Carregamento - Relatórios</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
        .info { background-color: #d1ecf1; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Teste de Carregamento - Relatórios</h1>
    
    <div class="section info">
        <h3>📋 Status do Carregamento</h3>
        <div id="loadingStatus">Iniciando...</div>
    </div>
    
    <div class="section">
        <h3>🧪 Teste Manual das Funções</h3>
        <button onclick="testarFuncao('showQuickActions')">Testar showQuickActions</button>
        <button onclick="testarFuncao('aplicarFiltrosSelects')">Testar aplicarFiltrosSelects</button>
        <button onclick="testarFuncao('atualizarRelatorios')">Testar atualizarRelatorios</button>
        <div id="testResult"></div>
    </div>
    
    <div class="section">
        <h3>📊 Console Logs</h3>
        <div id="consoleLogs"></div>
    </div>
    
    <div class="section">
        <h3>🔍 Debug das Funções</h3>
        <div id="debugInfo"></div>
    </div>

    <script>
        // Capturar logs do console
        const logsContainer = document.getElementById('consoleLogs');
        const originalLog = console.log;
        const originalError = console.error;
        
        function addLog(message, type = 'log') {
            const logElement = document.createElement('div');
            logElement.style.margin = '5px 0';
            logElement.style.padding = '5px';
            logElement.style.backgroundColor = type === 'error' ? '#f8d7da' : '#f8f9fa';
            logElement.style.borderLeft = type === 'error' ? '4px solid #dc3545' : '4px solid #007bff';
            logElement.innerHTML = `<strong>${type.toUpperCase()}:</strong> ${message}`;
            logsContainer.appendChild(logElement);
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addLog(args.join(' '), 'error');
        };
        
        // Função para testar funções específicas
        function testarFuncao(nome) {
            const resultContainer = document.getElementById('testResult');
            
            try {
                if (typeof window[nome] === 'function') {
                    resultContainer.innerHTML = `<div class="success">✅ ${nome} está disponível e funcionando!</div>`;
                    console.log(`✅ ${nome} está disponível como:`, window[nome]);
                } else {
                    resultContainer.innerHTML = `<div class="error">❌ ${nome} NÃO está disponível!</div>`;
                    console.log(`❌ ${nome} não está disponível. Tipo:`, typeof window[nome]);
                }
            } catch (error) {
                resultContainer.innerHTML = `<div class="error">❌ Erro ao testar ${nome}: ${error.message}</div>`;
                console.error(`❌ Erro ao testar ${nome}:`, error);
            }
        }
        
        // Função para verificar debug das funções
        function verificarDebug() {
            const debugContainer = document.getElementById('debugInfo');
            const funcoes = [
                'showQuickActions',
                'aplicarFiltrosSelects', 
                'atualizarRelatorios',
                'exportarRelatorio',
                'alterarPeriodoGrafico',
                'aplicarFiltros',
                'showToast'
            ];
            
            let html = '<h4>Informações de Debug:</h4>';
            
            funcoes.forEach(funcao => {
                const existe = typeof window[funcao] === 'function';
                const valor = window[funcao];
                
                html += `
                    <div style="margin: 10px 0; padding: 10px; background-color: ${existe ? '#d4edda' : '#f8d7da'}; border-radius: 4px;">
                        <strong>${funcao}:</strong><br>
                        <small>Type: ${typeof window[funcao]}</small><br>
                        <small>Value: ${valor}</small>
                    </div>
                `;
            });
            
            debugContainer.innerHTML = html;
        }
        
        // Função para verificar status geral
        function verificarStatus() {
            const statusContainer = document.getElementById('loadingStatus');
            const funcoes = [
                'showQuickActions',
                'aplicarFiltrosSelects', 
                'atualizarRelatorios',
                'exportarRelatorio',
                'alterarPeriodoGrafico',
                'aplicarFiltros',
                'showToast'
            ];
            
            const todasDisponiveis = funcoes.every(funcao => typeof window[funcao] === 'function');
            
            if (todasDisponiveis) {
                statusContainer.innerHTML = '<div class="success"><h3>🎉 SUCESSO!</h3>Todas as funções estão disponíveis e funcionando!</div>';
            } else {
                statusContainer.innerHTML = '<div class="error"><h3>⚠️ PROBLEMA DETECTADO</h3>Algumas funções não estão disponíveis.</div>';
            }
            
            verificarDebug();
        }
        
        // Carregar o arquivo JavaScript de forma robusta
        function carregarRelatoriosJS() {
            console.log('🚀 Iniciando carregamento do arquivo relatorios.js...');
            
            const script = document.createElement('script');
            script.src = '/static/js/relatorios.js';
            script.onload = function() {
                console.log('✅ Arquivo relatorios.js carregado com sucesso!');
                setTimeout(verificarStatus, 100);
            };
            script.onerror = function() {
                console.error('❌ Erro ao carregar relatorios.js');
                document.getElementById('loadingStatus').innerHTML = '<div class="error"><h3>❌ ERRO!</h3>Não foi possível carregar o arquivo relatorios.js</div>';
            };
            
            document.head.appendChild(script);
        }
        
        // Iniciar quando a página carregar
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 DOM carregado, iniciando carregamento...');
            carregarRelatoriosJS();
            
            // Verificações adicionais
            setTimeout(() => {
                console.log('🔍 Verificação adicional após 1 segundo...');
                verificarStatus();
            }, 1000);
            
            setTimeout(() => {
                console.log('🔍 Verificação final após 2 segundos...');
                verificarStatus();
            }, 2000);
        });
        
        // Log inicial
        console.log('🔍 Arquivo de teste carregado');
    </script>
</body>
</html>
