<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Página de Relatórios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/relatorios.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .test-success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .test-error { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .test-warning { background-color: #fff3cd; border: 1px solid #ffeaa7; color: #856404; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">🧪 Teste da Página de Relatórios</h1>
        
        <div class="test-section">
            <h3>1. Verificação de Arquivos</h3>
            <div id="fileCheck"></div>
        </div>
        
        <div class="test-section">
            <h3>2. Verificação de Funções JavaScript</h3>
            <div id="functionCheck"></div>
        </div>
        
        <div class="test-section">
            <h3>3. Teste de APIs</h3>
            <div id="apiCheck"></div>
        </div>
        
        <div class="test-section">
            <h3>4. Teste de Gráficos</h3>
            <div id="chartCheck"></div>
        </div>
        
        <div class="test-section">
            <h3>5. Teste de Funcionalidades</h3>
            <div id="featureCheck"></div>
        </div>
        
        <div class="test-section">
            <h3>6. Resumo dos Testes</h3>
            <div id="summary"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/relatorios.js"></script>
    <script>
        class RelatoriosTester {
            constructor() {
                this.results = {
                    files: [],
                    functions: [],
                    apis: [],
                    charts: [],
                    features: []
                };
                this.runTests();
            }

            async runTests() {
                console.log('🧪 Iniciando testes da página de relatórios...');
                
                // 1. Verificar arquivos
                this.testFiles();
                
                // 2. Verificar funções
                this.testFunctions();
                
                // 3. Testar APIs
                await this.testAPIs();
                
                // 4. Testar gráficos
                this.testCharts();
                
                // 5. Testar funcionalidades
                this.testFeatures();
                
                // 6. Mostrar resumo
                this.showSummary();
            }

            testFiles() {
                const files = [
                    { name: 'relatorios.html', path: '/templates/relatorios.html' },
                    { name: 'relatorios.js', path: '/static/js/relatorios.js' },
                    { name: 'relatorios.css', path: '/static/css/relatorios.css' }
                ];

                files.forEach(file => {
                    fetch(file.path)
                        .then(response => {
                            if (response.ok) {
                                this.addResult('files', 'success', `✅ ${file.name} - OK`);
                            } else {
                                this.addResult('files', 'error', `❌ ${file.name} - Não encontrado`);
                            }
                        })
                        .catch(() => {
                            this.addResult('files', 'error', `❌ ${file.name} - Erro ao acessar`);
                        });
                });
            }

            testFunctions() {
                const functions = [
                    'atualizarRelatorios',
                    'exportarRelatorio',
                    'aplicarFiltrosSelects',
                    'alterarPeriodoGrafico',
                    'showQuickActions',
                    'showToast'
                ];

                functions.forEach(funcName => {
                    if (typeof window[funcName] === 'function') {
                        this.addResult('functions', 'success', `✅ ${funcName}() - OK`);
                    } else {
                        this.addResult('functions', 'error', `❌ ${funcName}() - Não definida`);
                    }
                });
            }

            async testAPIs() {
                const apis = [
                    '/api/relatorios/agendamentos-por-dia?dias=30',
                    '/api/relatorios/agendamentos-por-profissional',
                    '/api/relatorios/receita-por-mes',
                    '/api/relatorios/status-agendamentos',
                    '/api/relatorios/horarios-populares'
                ];

                for (const api of apis) {
                    try {
                        const response = await fetch(api);
                        if (response.ok) {
                            const data = await response.json();
                            if (data.success) {
                                this.addResult('apis', 'success', `✅ ${api} - OK`);
                            } else {
                                this.addResult('apis', 'warning', `⚠️ ${api} - Resposta sem sucesso`);
                            }
                        } else {
                            this.addResult('apis', 'error', `❌ ${api} - Status ${response.status}`);
                        }
                    } catch (error) {
                        this.addResult('apis', 'error', `❌ ${api} - Erro: ${error.message}`);
                    }
                }
            }

            testCharts() {
                // Verificar se Chart.js está disponível
                if (typeof Chart !== 'undefined') {
                    this.addResult('charts', 'success', '✅ Chart.js - OK');
                    
                    // Testar criação de gráfico simples
                    try {
                        const canvas = document.createElement('canvas');
                        const chart = new Chart(canvas, {
                            type: 'line',
                            data: { labels: ['Teste'], datasets: [{ data: [1] }] },
                            options: { responsive: false }
                        });
                        chart.destroy();
                        this.addResult('charts', 'success', '✅ Criação de gráficos - OK');
                    } catch (error) {
                        this.addResult('charts', 'error', `❌ Criação de gráficos - Erro: ${error.message}`);
                    }
                } else {
                    this.addResult('charts', 'error', '❌ Chart.js - Não disponível');
                }
            }

            testFeatures() {
                // Testar filtros
                const filtros = document.querySelectorAll('#periodoFiltro, #profissionalFiltro, #servicoFiltro');
                if (filtros.length > 0) {
                    this.addResult('features', 'success', '✅ Filtros - Presentes');
                } else {
                    this.addResult('features', 'warning', '⚠️ Filtros - Não encontrados');
                }

                // Testar botões de ação
                const botoes = document.querySelectorAll('.btn');
                if (botoes.length > 0) {
                    this.addResult('features', 'success', `✅ Botões - ${botoes.length} encontrados`);
                } else {
                    this.addResult('features', 'warning', '⚠️ Botões - Não encontrados');
                }

                // Testar cards de resumo
                const cards = document.querySelectorAll('.card-gradient-primary, .card-gradient-success, .card-gradient-info, .card-gradient-warning');
                if (cards.length > 0) {
                    this.addResult('features', 'success', `✅ Cards de resumo - ${cards.length} encontrados`);
                } else {
                    this.addResult('features', 'warning', '⚠️ Cards de resumo - Não encontrados');
                }
            }

            addResult(category, type, message) {
                this.results[category].push({ type, message });
                this.updateDisplay(category, message, type);
            }

            updateDisplay(category, message, type) {
                const container = document.getElementById(category + 'Check');
                const div = document.createElement('div');
                div.className = `test-result test-${type}`;
                div.textContent = message;
                container.appendChild(div);
            }

            showSummary() {
                const summary = document.getElementById('summary');
                let totalTests = 0;
                let totalSuccess = 0;
                let totalErrors = 0;
                let totalWarnings = 0;

                Object.values(this.results).forEach(category => {
                    category.forEach(result => {
                        totalTests++;
                        if (result.type === 'success') totalSuccess++;
                        else if (result.type === 'error') totalErrors++;
                        else if (result.type === 'warning') totalWarnings++;
                    });
                });

                const successRate = ((totalSuccess / totalTests) * 100).toFixed(1);
                
                let status = 'success';
                if (totalErrors > 0) status = 'error';
                else if (totalWarnings > 0) status = 'warning';

                summary.innerHTML = `
                    <div class="test-result test-${status}">
                        <h4>📊 Resumo dos Testes</h4>
                        <p><strong>Total de testes:</strong> ${totalTests}</p>
                        <p><strong>Sucessos:</strong> ${totalSuccess} ✅</p>
                        <p><strong>Avisos:</strong> ${totalWarnings} ⚠️</p>
                        <p><strong>Erros:</strong> ${totalErrors} ❌</p>
                        <p><strong>Taxa de sucesso:</strong> ${successRate}%</p>
                    </div>
                `;

                console.log(`🧪 Testes concluídos: ${totalSuccess}/${totalTests} (${successRate}%)`);
            }
        }

        // Executar testes quando a página carregar
        document.addEventListener('DOMContentLoaded', () => {
            new RelatoriosTester();
        });
    </script>
</body>
</html>
