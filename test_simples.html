<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Simples - Relatórios</title>
</head>
<body>
    <h1>🧪 Teste Simples das Funções</h1>
    
    <div id="status">Carregando...</div>
    
    <button onclick="testarFuncao('showQuickActions')">Testar showQuickActions</button>
    <button onclick="testarFuncao('aplicarFiltrosSelects')">Testar aplicarFiltrosSelects</button>
    
    <div id="resultado"></div>
    
    <!-- Carregar o arquivo de relatórios -->
    <script src="/static/js/relatorios.js"></script>
    
    <script>
        function testarFuncao(nome) {
            const resultado = document.getElementById('resultado');
            
            try {
                if (typeof window[nome] === 'function') {
                    resultado.innerHTML = `<p style="color: green;">✅ ${nome} está disponível!</p>`;
                    console.log(`✅ ${nome} está disponível como:`, window[nome]);
                } else {
                    resultado.innerHTML = `<p style="color: red;">❌ ${nome} NÃO está disponível!</p>`;
                    console.log(`❌ ${nome} não está disponível. Tipo:`, typeof window[nome]);
                }
            } catch (error) {
                resultado.innerHTML = `<p style="color: red;">❌ Erro ao testar ${nome}: ${error.message}</p>`;
                console.error(`❌ Erro ao testar ${nome}:`, error);
            }
        }
        
        // Verificar status quando carregar
        document.addEventListener('DOMContentLoaded', () => {
            const status = document.getElementById('status');
            
            // Verificar funções específicas
            const funcoes = ['showQuickActions', 'aplicarFiltrosSelects', 'atualizarRelatorios', 'exportarRelatorio'];
            
            let todasOk = true;
            let html = '<h3>Status das Funções:</h3>';
            
            funcoes.forEach(funcao => {
                const existe = typeof window[funcao] === 'function';
                if (!existe) todasOk = false;
                
                html += `<p>${existe ? '✅' : '❌'} ${funcao}: ${existe ? 'Disponível' : 'NÃO ENCONTRADA'}</p>`;
            });
            
            if (todasOk) {
                status.innerHTML = '<h2 style="color: green;">🎉 TODAS AS FUNÇÕES ESTÃO FUNCIONANDO!</h2>' + html;
            } else {
                status.innerHTML = '<h2 style="color: red;">⚠️ ALGUMAS FUNÇÕES NÃO ESTÃO DISPONÍVEIS!</h2>' + html;
            }
            
            // Log detalhado
            console.log('🔍 Verificação detalhada:');
            funcoes.forEach(funcao => {
                console.log(`  ${funcao}:`, typeof window[funcao], window[funcao]);
            });
        });
        
        // Verificação adicional
        setTimeout(() => {
            console.log('🔍 Verificação adicional após 1 segundo:');
            console.log('showQuickActions:', typeof window.showQuickActions);
            console.log('aplicarFiltrosSelects:', typeof window.aplicarFiltrosSelects);
        }, 1000);
    </script>
</body>
</html>
