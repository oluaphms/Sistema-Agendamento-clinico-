<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Acesso ao Arquivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1>🧪 Teste de Acesso ao Arquivo relatorios.js</h1>
        
        <div class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>
            <strong>ℹ️ IMPORTANTE:</strong> Certifique-se de que o Flask app está rodando na porta 8080
        </div>
        
        <div class="card mb-4">
            <div class="card-header">
                <h5>Teste de Carregamento</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-primary" onclick="testarCarregamento()">Testar Carregamento</button>
                <div id="resultado" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5>Logs</h5>
            </div>
            <div class="card-body">
                <div id="logs"></div>
            </div>
        </div>
    </div>

    <script>
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const log = document.createElement('div');
            log.className = `alert alert-${type} mb-2`;
            log.innerHTML = `
                <small class="text-muted">${new Date().toLocaleTimeString()}</small>
                <span class="ms-2">${message}</span>
            `;
            logs.appendChild(log);
        }
        
        async function testarCarregamento() {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = '<div class="alert alert-info">Testando...</div>';
            
            try {
                // Teste 1: Verificar se o arquivo existe via fetch
                addLog('🔍 Testando acesso via fetch...');
                const response = await fetch('http://localhost:8080/static/js/relatorios.js');
                
                if (response.ok) {
                    addLog('✅ Arquivo acessível via fetch', 'success');
                    const content = await response.text();
                    addLog(`📄 Tamanho do arquivo: ${content.length} caracteres`, 'success');
                    
                    // Teste 2: Carregar o script dinamicamente
                    addLog('🔍 Testando carregamento dinâmico...');
                    await carregarScript();
                    
                } else {
                    addLog(`❌ Erro HTTP: ${response.status} ${response.statusText}`, 'danger');
                    resultado.innerHTML = `<div class="alert alert-danger">Erro HTTP: ${response.status}</div>`;
                }
                
            } catch (error) {
                addLog(`❌ Erro de rede: ${error.message}`, 'danger');
                resultado.innerHTML = `<div class="alert alert-danger">Erro de rede: ${error.message}</div>`;
            }
        }
        
        function carregarScript() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'http://localhost:8080/static/js/relatorios.js';
                
                script.onload = () => {
                    addLog('✅ Script carregado com sucesso!', 'success');
                    
                    // Verificar se as funções estão disponíveis
                    setTimeout(() => {
                        verificarFuncoes();
                        resolve();
                    }, 100);
                };
                
                script.onerror = () => {
                    addLog('❌ Erro ao carregar script', 'danger');
                    reject(new Error('Falha ao carregar script'));
                };
                
                document.head.appendChild(script);
            });
        }
        
        function verificarFuncoes() {
            const funcoes = [
                'aplicarFiltrosSelects',
                'atualizarRelatorios',
                'exportarRelatorio',
                'alterarPeriodoGrafico',
                'showQuickActions',
                'aplicarFiltros',
                'showToast'
            ];
            
            addLog('🔍 Verificando funções...');
            
            funcoes.forEach(funcao => {
                const existe = typeof window[funcao] === 'function';
                const status = existe ? 'success' : 'danger';
                const icon = existe ? '✅' : '❌';
                addLog(`${icon} ${funcao}: ${existe ? 'Disponível' : 'Não encontrada'}`, status);
            });
            
            const todasDisponiveis = funcoes.every(funcao => typeof window[funcao] === 'function');
            
            if (todasDisponiveis) {
                addLog('🎉 Todas as funções estão disponíveis!', 'success');
                document.getElementById('resultado').innerHTML = `
                    <div class="alert alert-success">
                        <strong>✅ SUCESSO!</strong> Todas as funções foram carregadas corretamente!
                    </div>
                `;
            } else {
                addLog('⚠️ Algumas funções não estão disponíveis', 'warning');
                document.getElementById('resultado').innerHTML = `
                    <div class="alert alert-warning">
                        <strong>⚠️ ATENÇÃO!</strong> Algumas funções não foram carregadas.
                    </div>
                `;
            }
        }
        
        // Teste automático ao carregar a página
        window.addEventListener('load', () => {
            addLog('🚀 Página carregada, pronto para testes');
        });
    </script>
</body>
</html>
