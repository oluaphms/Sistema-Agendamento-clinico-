<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Funções de Relatórios</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🐛 Debug - Funções de Relatórios</h1>
    
    <div class="debug-section info">
        <h3>📋 Status do Carregamento</h3>
        <div id="loadingStatus">Carregando...</div>
    </div>
    
    <div class="debug-section">
        <h3>🔍 Verificação das Funções</h3>
        <div id="functionStatus">Verificando...</div>
    </div>
    
    <div class="debug-section">
        <h3>🧪 Teste das Funções</h3>
        <button onclick="testarTodasFuncoes()">Testar Todas as Funções</button>
        <div id="testResults"></div>
    </div>
    
    <div class="debug-section">
        <h3>📊 Console Logs</h3>
        <div id="consoleLogs"></div>
    </div>

    <!-- Carregar o arquivo de relatórios -->
    <script src="/static/js/relatorios.js"></script>
    
    <script>
        // Capturar logs do console
        const originalLog = console.log;
        const originalError = console.error;
        const logsContainer = document.getElementById('consoleLogs');
        
        function addLog(message, type = 'log') {
            const logElement = document.createElement('div');
            logElement.style.margin = '5px 0';
            logElement.style.padding = '5px';
            logElement.style.backgroundColor = type === 'error' ? '#f8d7da' : '#f8f9fa';
            logElement.style.borderLeft = type === 'error' ? '4px solid #dc3545' : '4px solid #007bff';
            logElement.innerHTML = `<strong>${type.toUpperCase()}:</strong> ${message}`;
            logsContainer.appendChild(logElement);
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addLog(args.join(' '), 'error');
        };
        
        // Função para verificar status das funções
        function verificarFuncoes() {
            const funcoes = [
                'aplicarFiltrosSelects',
                'atualizarRelatorios', 
                'exportarRelatorio',
                'alterarPeriodoGrafico',
                'showQuickActions',
                'aplicarFiltros',
                'showToast'
            ];
            
            const statusContainer = document.getElementById('functionStatus');
            let html = '<h4>Status das Funções:</h4>';
            
            funcoes.forEach(funcao => {
                const existe = typeof window[funcao] === 'function';
                const status = existe ? 'success' : 'error';
                const icon = existe ? '✅' : '❌';
                const texto = existe ? 'Disponível' : 'NÃO ENCONTRADA';
                
                html += `
                    <div style="margin: 10px 0; padding: 10px; background-color: ${existe ? '#d4edda' : '#f8d7da'}; border-radius: 4px;">
                        <strong>${icon} ${funcao}:</strong> ${texto}
                        <br><small>Type: ${typeof window[funcao]}</small>
                    </div>
                `;
            });
            
            statusContainer.innerHTML = html;
            
            // Verificar se todas estão disponíveis
            const todasDisponiveis = funcoes.every(funcao => typeof window[funcao] === 'function');
            
            if (todasDisponiveis) {
                document.getElementById('loadingStatus').innerHTML = 
                    '<div class="success"><h3>🎉 SUCESSO!</h3>Todas as funções estão disponíveis e funcionando!</div>';
            } else {
                document.getElementById('loadingStatus').innerHTML = 
                    '<div class="error"><h3>⚠️ PROBLEMA DETECTADO</h3>Algumas funções não estão disponíveis. Verifique o console para mais detalhes.</div>';
            }
        }
        
        // Função para testar todas as funções
        function testarTodasFuncoes() {
            const funcoes = [
                'aplicarFiltrosSelects',
                'atualizarRelatorios', 
                'exportarRelatorio',
                'alterarPeriodoGrafico',
                'showQuickActions',
                'aplicarFiltros',
                'showToast'
            ];
            
            const resultsContainer = document.getElementById('testResults');
            let html = '<h4>Resultados dos Testes:</h4>';
            
            funcoes.forEach(funcao => {
                try {
                    if (typeof window[funcao] === 'function') {
                        // Tentar executar a função (sem parâmetros para evitar erros)
                        if (funcao === 'exportarRelatorio') {
                            // Para exportarRelatorio, usar um formato válido
                            window[funcao]('csv');
                        } else if (funcao === 'alterarPeriodoGrafico') {
                            // Para alterarPeriodoGrafico, usar um período válido
                            window[funcao](6);
                        } else {
                            // Para outras funções, executar sem parâmetros
                            window[funcao]();
                        }
                        
                        html += `<div style="margin: 5px 0; padding: 5px; background-color: #d4edda; border-radius: 4px;">
                            ✅ ${funcao}: Executada com sucesso
                        </div>`;
                    } else {
                        html += `<div style="margin: 5px 0; padding: 5px; background-color: #f8d7da; border-radius: 4px;">
                            ❌ ${funcao}: Função não encontrada
                        </div>`;
                    }
                } catch (error) {
                    html += `<div style="margin: 5px 0; padding: 5px; background-color: #f8d7da; border-radius: 4px;">
                        ❌ ${funcao}: Erro ao executar - ${error.message}
                    </div>`;
                }
            });
            
            resultsContainer.innerHTML = html;
        }
        
        // Verificar funções quando a página carregar
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 DOM carregado, iniciando verificação...');
            
            // Aguardar um pouco para garantir que o script foi carregado
            setTimeout(() => {
                verificarFuncoes();
            }, 100);
            
            // Verificação adicional após mais tempo
            setTimeout(() => {
                console.log('🔍 Verificação adicional...');
                verificarFuncoes();
            }, 1000);
            
            // Verificação final
            setTimeout(() => {
                console.log('🔍 Verificação final...');
                verificarFuncoes();
            }, 2000);
        });
        
        // Log inicial
        console.log('🔍 Arquivo de debug carregado');
        console.log('📁 Verificando se o arquivo relatorios.js foi carregado...');
    </script>
</body>
</html>
