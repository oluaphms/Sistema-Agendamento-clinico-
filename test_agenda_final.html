<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Final dos Botões da Agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Teste Final dos Botões da Agenda</h1>
        <p class="text-muted">Este teste verifica se os botões estão funcionando após as correções</p>
        
        <div class="row mt-4">
            <div class="col-md-6">
                <h3>Botões de Navegação</h3>
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-secondary" onclick="toggleView('calendar')">
                        <i class="bi bi-calendar3 me-2"></i>Calendário
                    </button>
                    <button class="btn btn-outline-secondary" onclick="toggleView('list')">
                        <i class="bi bi-list-ul me-2"></i>Lista
                    </button>
                    <button class="btn btn-primary" onclick="showQuickAppointment()">
                        <i class="bi bi-calendar-plus me-2"></i>Novo Agendamento
                    </button>
                </div>
            </div>
            
            <div class="col-md-6">
                <h3>Botões de Ação</h3>
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-primary" onclick="editAppointment(1)">
                        <i class="bi bi-pencil"></i> Editar
                    </button>
                    <button class="btn btn-outline-success" onclick="confirmAppointment(1)">
                        <i class="bi bi-check"></i> Confirmar
                    </button>
                    <button class="btn btn-outline-warning" onclick="rescheduleAppointment(1)">
                        <i class="bi bi-arrow-clockwise"></i> Reagendar
                    </button>
                    <button class="btn btn-outline-danger" onclick="cancelAppointment(1)">
                        <i class="bi bi-x"></i> Cancelar
                    </button>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <h3>Botões de Filtro</h3>
                <div class="d-flex gap-2">
                    <button class="btn btn-secondary" onclick="applyFilters()">
                        <i class="bi bi-funnel me-2"></i>Filtrar
                    </button>
                    <button class="btn btn-sm btn-outline-primary" onclick="exportAgenda()">
                        <i class="bi bi-download me-1"></i>Exportar
                    </button>
                    <button class="btn btn-sm btn-outline-success" onclick="showBulkActions()">
                        <i class="bi bi-collection me-1"></i>Ações em Lote
                    </button>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <h3>Status do JavaScript</h3>
                <div id="status" class="alert alert-info">
                    <i class="bi bi-info-circle me-2"></i>
                    Verificando funções...
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <h3>Console de Log</h3>
                <div id="console" class="bg-dark text-light p-3 rounded" style="height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;">
                    Aguardando logs...
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Carregar agenda.js -->
    <script src="static/js/agenda.js"></script>
    
    <script>
        // Função para adicionar logs ao console visual
        function addLog(message, type = 'info') {
            const consoleDiv = document.getElementById('console');
            const timestamp = new Date().toLocaleTimeString();
            const colorClass = type === 'success' ? 'text-success' : type === 'error' ? 'text-danger' : 'text-light';
            consoleDiv.innerHTML += `<div class="${colorClass}">[${timestamp}] ${message}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
        
        // Interceptar console.log para mostrar no console visual
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'info');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addLog(args.join(' '), 'error');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addLog(args.join(' '), 'warning');
        };
        
        // Verificação das funções
        document.addEventListener('DOMContentLoaded', function() {
            addLog('DOM carregado, verificando funções...', 'info');
            
            const statusDiv = document.getElementById('status');
            const requiredFunctions = [
                'showQuickAppointment', 'toggleView', 'applyFilters', 'exportAgenda',
                'showBulkActions', 'editAppointment', 'confirmAppointment', 
                'rescheduleAppointment', 'cancelAppointment'
            ];
            
            // Aguardar um pouco para o agenda.js carregar
            setTimeout(function() {
                let missingFunctions = [];
                requiredFunctions.forEach(funcName => {
                    if (typeof window[funcName] !== 'function') {
                        missingFunctions.push(funcName);
                        addLog(`❌ ${funcName}: NÃO DEFINIDA`, 'error');
                    } else {
                        addLog(`✅ ${funcName}: OK`, 'success');
                    }
                });
                
                if (missingFunctions.length === 0) {
                    statusDiv.className = 'alert alert-success';
                    statusDiv.innerHTML = '<i class="bi bi-check-circle me-2"></i><strong>✅ Sucesso!</strong> Todas as funções estão funcionando corretamente.';
                    addLog('🎉 TODAS AS FUNÇÕES ESTÃO FUNCIONANDO!', 'success');
                } else {
                    statusDiv.className = 'alert alert-danger';
                    statusDiv.innerHTML = `<i class="bi bi-exclamation-triangle me-2"></i><strong>❌ Erro!</strong> ${missingFunctions.length} funções estão faltando.`;
                    addLog(`⚠️ ${missingFunctions.length} funções estão faltando: ${missingFunctions.join(', ')}`, 'error');
                }
            }, 1000);
        });
    </script>
</body>
</html>
