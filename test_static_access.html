<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Acesso aos Arquivos Estáticos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1>🧪 Teste de Acesso aos Arquivos Estáticos</h1>
        
        <div class="card mb-4">
            <div class="card-header">
                <h5>Status dos Arquivos</h5>
            </div>
            <div class="card-body">
                <div id="status"></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5>Logs</h5>
            </div>
            <div class="card-body">
                <div id="logs"></div>
            </div>
        </div>
    </div>

    <script>
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const log = document.createElement('div');
            log.className = `alert alert-${type} mb-2`;
            log.innerHTML = `
                <small class="text-muted">${new Date().toLocaleTimeString()}</small>
                <span class="ms-2">${message}</span>
            `;
            logs.appendChild(log);
        }
        
        async function testarArquivos() {
            const status = document.getElementById('status');
            status.innerHTML = '<div class="alert alert-info">Testando...</div>';
            
            const arquivos = [
                '/static/js/relatorios.js',
                '/static/css/relatorios.css',
                '/static/js/agenda.js',
                '/static/js/live_menu.js',
                '/static/js/button-handlers.js'
            ];
            
            let sucessos = 0;
            let falhas = 0;
            
            for (const arquivo of arquivos) {
                try {
                    addLog(`🔍 Testando: ${arquivo}`);
                    const response = await fetch(arquivo);
                    
                    if (response.ok) {
                        addLog(`✅ ${arquivo} - OK (${response.status})`, 'success');
                        sucessos++;
                    } else {
                        addLog(`❌ ${arquivo} - Erro ${response.status}`, 'danger');
                        falhas++;
                    }
                } catch (error) {
                    addLog(`❌ ${arquivo} - Erro de rede: ${error.message}`, 'danger');
                    falhas++;
                }
            }
            
            // Resultado final
            if (falhas === 0) {
                status.innerHTML = `
                    <div class="alert alert-success">
                        <strong>🎉 SUCESSO TOTAL!</strong> Todos os ${sucessos} arquivos estão acessíveis!
                    </div>
                `;
            } else {
                status.innerHTML = `
                    <div class="alert alert-warning">
                        <strong>⚠️ RESULTADO PARCIAL</strong><br>
                        ✅ Sucessos: ${sucessos}<br>
                        ❌ Falhas: ${falhas}
                    </div>
                `;
            }
        }
        
        // Teste automático ao carregar a página
        window.addEventListener('load', () => {
            addLog('🚀 Página carregada, iniciando testes...');
            setTimeout(testarArquivos, 1000);
        });
    </script>
</body>
</html>
