<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste dos Botões da Agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Teste dos Botões da Agenda</h1>
        
        <div class="row mt-4">
            <div class="col-md-6">
                <h3>Botões de Navegação</h3>
                <button class="btn btn-outline-secondary mb-2" onclick="toggleView('calendar')">
                    <i class="bi bi-calendar3 me-2"></i>Calendário
                </button>
                <br>
                <button class="btn btn-outline-secondary mb-2" onclick="toggleView('list')">
                    <i class="bi bi-list-ul me-2"></i>Lista
                </button>
                <br>
                <button class="btn btn-primary mb-2" onclick="showQuickAppointment()">
                    <i class="bi bi-calendar-plus me-2"></i>Novo Agendamento
                </button>
            </div>
            
            <div class="col-md-6">
                <h3>Botões de Ação</h3>
                <button class="btn btn-outline-primary mb-2" onclick="editAppointment(1)">
                    <i class="bi bi-pencil"></i> Editar
                </button>
                <br>
                <button class="btn btn-outline-success mb-2" onclick="confirmAppointment(1)">
                    <i class="bi bi-check"></i> Confirmar
                </button>
                <br>
                <button class="btn btn-outline-warning mb-2" onclick="rescheduleAppointment(1)">
                    <i class="bi bi-arrow-clockwise"></i> Reagendar
                </button>
                <br>
                <button class="btn btn-outline-danger mb-2" onclick="cancelAppointment(1)">
                    <i class="bi bi-x"></i> Cancelar
                </button>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <h3>Botões de Filtro</h3>
                <button class="btn btn-secondary" onclick="applyFilters()">
                    <i class="bi bi-funnel me-2"></i>Filtrar
                </button>
                <button class="btn btn-sm btn-outline-primary ms-2" onclick="exportAgenda()">
                    <i class="bi bi-download me-1"></i>Exportar
                </button>
                <button class="btn btn-sm btn-outline-success ms-2" onclick="showBulkActions()">
                    <i class="bi bi-collection me-1"></i>Ações em Lote
                </button>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <h3>Status do JavaScript</h3>
                <div id="status" class="alert alert-info">
                    Verificando funções...
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Carregar agenda.js -->
    <script src="static/js/agenda.js"></script>
    
    <script>
        // Verificação das funções
        document.addEventListener('DOMContentLoaded', function() {
            const statusDiv = document.getElementById('status');
            const requiredFunctions = [
                'showQuickAppointment', 'toggleView', 'applyFilters', 'exportAgenda',
                'showBulkActions', 'editAppointment', 'confirmAppointment', 
                'rescheduleAppointment', 'cancelAppointment'
            ];
            
            let missingFunctions = [];
            requiredFunctions.forEach(funcName => {
                if (typeof window[funcName] !== 'function') {
                    missingFunctions.push(funcName);
                }
            });
            
            if (missingFunctions.length === 0) {
                statusDiv.className = 'alert alert-success';
                statusDiv.innerHTML = '<strong>✅ Sucesso!</strong> Todas as funções estão funcionando corretamente.';
            } else {
                statusDiv.className = 'alert alert-danger';
                statusDiv.innerHTML = `<strong>❌ Erro!</strong> Funções faltando: ${missingFunctions.join(', ')}`;
            }
            
            console.log('=== VERIFICAÇÃO COMPLETA ===');
            console.log('Funções disponíveis:', requiredFunctions.filter(f => typeof window[f] === 'function'));
            console.log('Funções faltando:', missingFunctions);
        });
    </script>
</body>
</html>
