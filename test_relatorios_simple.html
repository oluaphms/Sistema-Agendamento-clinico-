<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Relatórios Simples</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Teste Simples - Relatórios</h1>
        
        <div class="row">
            <div class="col-md-6">
                <h3>Botões de Teste</h3>
                <button class="btn btn-primary mb-2" onclick="atualizarRelatorios()">
                    Atualizar Relatórios
                </button>
                <br>
                <button class="btn btn-success mb-2" onclick="exportarRelatorio('csv')">
                    Exportar CSV
                </button>
                <br>
                <button class="btn btn-info mb-2" onclick="exportarRelatorio('pdf')">
                    Exportar PDF
                </button>
                <br>
                <button class="btn btn-warning mb-2" onclick="aplicarFiltrosSelects()">
                    Aplicar Filtros
                </button>
            </div>
            
            <div class="col-md-6">
                <h3>Status das Funções</h3>
                <div id="status" class="border p-3">
                    Verificando...
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/relatorios.js"></script>
    
    <script>
        // Verificar funções após carregamento
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                checkFunctions();
            }, 1000);
        });
        
        function checkFunctions() {
            const statusDiv = document.getElementById('status');
            let html = '<h4>Status das Funções:</h4>';
            
            const functions = [
                'atualizarRelatorios',
                'exportarRelatorio', 
                'aplicarFiltrosSelects'
            ];
            
            functions.forEach(funcName => {
                if (typeof window[funcName] === 'function') {
                    html += `<div class="text-success">✅ ${funcName}: OK</div>`;
                } else {
                    html += `<div class="text-danger">❌ ${funcName}: NÃO DEFINIDA</div>`;
                }
            });
            
            statusDiv.innerHTML = html;
        }
    </script>
</body>
</html>
