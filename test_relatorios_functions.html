<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Funções de Relatórios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center mb-4">🧪 Teste de Funções de Relatórios</h1>
                
                <div class="card">
                    <div class="card-header">
                        <h5>Teste de Botões</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <button class="btn btn-outline-info w-100" onclick="atualizarRelatorios()">
                                    <i class="bi bi-arrow-clockwise me-2"></i>Atualizar
                                </button>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-outline-primary w-100" onclick="exportarRelatorio('pdf')">
                                    <i class="bi bi-file-pdf me-2"></i>Exportar PDF
                                </button>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-outline-success w-100" onclick="exportarRelatorio('csv')">
                                    <i class="bi bi-file-earmark-spreadsheet me-2"></i>Exportar CSV
                                </button>
                            </div>
                        </div>
                        
                        <div class="row mt-3">
                            <div class="col-md-4">
                                <button class="btn btn-outline-warning w-100" onclick="aplicarFiltrosSelects()">
                                    <i class="bi bi-funnel me-2"></i>Aplicar Filtros
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header">
                        <h5>Status das Funções</h5>
                    </div>
                    <div class="card-body">
                        <div id="statusContainer">
                            <div class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Carregando...</span>
                                </div>
                                <p class="mt-2">Verificando funções...</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header">
                        <h5>Console Log</h5>
                    </div>
                    <div class="card-body">
                        <div id="consoleOutput" class="bg-dark text-light p-3 rounded" style="height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;">
                            <div>Console será exibido aqui...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
    
    <!-- Script principal de relatórios -->
    <script src="/static/js/relatorios.js"></script>
    
    <script>
        // Capturar console.log para exibir na tela
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addToConsole(message, type = 'log') {
            const container = document.getElementById('consoleOutput');
            const div = document.createElement('div');
            div.className = `text-${type === 'error' ? 'danger' : type === 'warn' ? 'warning' : 'light'}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToConsole(args.join(' '), 'warn');
        };
        
        // Verificar status das funções
        function verificarStatusFuncoes() {
            const funcoes = [
                'atualizarRelatorios',
                'exportarRelatorio', 
                'aplicarFiltrosSelects',
                'showToast'
            ];
            
            const container = document.getElementById('statusContainer');
            let html = '<div class="row">';
            
            funcoes.forEach(funcao => {
                const disponivel = typeof window[funcao] === 'function';
                const statusClass = disponivel ? 'success' : 'danger';
                const statusIcon = disponivel ? 'check-circle' : 'x-circle';
                const statusText = disponivel ? 'Disponível' : 'Indisponível';
                
                html += `
                    <div class="col-md-6 mb-2">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-${statusIcon} text-${statusClass} me-2"></i>
                            <span class="fw-bold">${funcao}:</span>
                            <span class="ms-2 badge bg-${statusClass}">${statusText}</span>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            
            if (funcoes.every(f => typeof window[f] === 'function')) {
                html += '<div class="alert alert-success mt-3">🎉 Todas as funções estão funcionando corretamente!</div>';
            } else {
                html += '<div class="alert alert-danger mt-3">❌ Algumas funções não estão disponíveis. Verifique o console para mais detalhes.</div>';
            }
            
            container.innerHTML = html;
        }
        
        // Verificar quando a página carregar
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Página carregada, verificando funções...');
            
            // Aguardar um pouco para o script carregar
            setTimeout(() => {
                verificarStatusFuncoes();
                console.log('✅ Verificação concluída');
            }, 500);
        });
        
        // Verificar novamente após 2 segundos
        setTimeout(() => {
            console.log('🔍 Verificação final das funções...');
            verificarStatusFuncoes();
        }, 2000);
    </script>
</body>
</html>
