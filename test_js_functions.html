<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Funções JavaScript - Relatórios</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { margin: 5px; padding: 10px 15px; }
        .log { background: #f8f9fa; padding: 10px; margin: 10px 0; border-radius: 3px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>🧪 Teste de Funções JavaScript - Sistema de Relatórios</h1>
    
    <div class="test-section">
        <h3>1️⃣ Teste de Funções Globais</h3>
        <button onclick="testGlobalFunctions()">Testar Funções</button>
        <div id="globalTestResult" class="log"></div>
    </div>
    
    <div class="test-section">
        <h3>2️⃣ Teste de Exportação</h3>
        <button onclick="testExportacao()">Testar Exportação</button>
        <div id="exportTestResult" class="log"></div>
    </div>
    
    <div class="test-section">
        <h3>3️⃣ Teste de Filtros</h3>
        <button onclick="testFiltros()">Testar Filtros</button>
        <div id="filtrosTestResult" class="log"></div>
    </div>
    
    <div class="test-section">
        <h3>4️⃣ Console Log</h3>
        <div id="consoleLog" class="log" style="max-height: 200px; overflow-y: auto;"></div>
    </div>

    <script>
        // Capturar logs do console
        const originalLog = console.log;
        const originalError = console.error;
        const consoleLogDiv = document.getElementById('consoleLog');
        
        function addToLog(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `[${timestamp}] ${type.toUpperCase()}: ${message}`;
            logEntry.style.color = type === 'error' ? 'red' : 'black';
            consoleLogDiv.appendChild(logEntry);
            consoleLogDiv.scrollTop = consoleLogDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToLog(args.join(' '));
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToLog(args.join(' '), 'error');
        };

        // Funções de teste
        function testGlobalFunctions() {
            const resultDiv = document.getElementById('globalTestResult');
            resultDiv.innerHTML = '';
            
            try {
                // Testar se as funções estão definidas
                const functions = [
                    'aplicarFiltrosSelects',
                    'atualizarRelatorios', 
                    'exportarRelatorio',
                    'alterarPeriodoGrafico',
                    'showQuickActions'
                ];
                
                let allDefined = true;
                let results = [];
                
                functions.forEach(funcName => {
                    if (typeof window[funcName] === 'function') {
                        results.push(`✅ ${funcName}: Definida`);
                    } else {
                        results.push(`❌ ${funcName}: Não definida`);
                        allDefined = false;
                    }
                });
                
                resultDiv.innerHTML = results.join('<br>');
                resultDiv.className = allDefined ? 'log success' : 'log error';
                
                if (allDefined) {
                    resultDiv.innerHTML += '<br><strong>🎉 Todas as funções estão definidas!</strong>';
                } else {
                    resultDiv.innerHTML += '<br><strong>⚠️ Algumas funções não estão definidas!</strong>';
                }
                
            } catch (error) {
                resultDiv.innerHTML = `❌ Erro no teste: ${error.message}`;
                resultDiv.className = 'log error';
            }
        }
        
        function testExportacao() {
            const resultDiv = document.getElementById('exportTestResult');
            resultDiv.innerHTML = '';
            
            try {
                // Simular exportação
                if (typeof exportarRelatorio === 'function') {
                    resultDiv.innerHTML = '✅ Função exportarRelatorio está disponível<br>';
                    resultDiv.innerHTML += '📝 Testando com formato CSV...<br>';
                    
                    // Testar chamada da função
                    try {
                        exportarRelatorio('csv');
                        resultDiv.innerHTML += '✅ Função executada sem erros';
                    } catch (error) {
                        resultDiv.innerHTML += `❌ Erro ao executar: ${error.message}`;
                    }
                    
                    resultDiv.className = 'log success';
                } else {
                    resultDiv.innerHTML = '❌ Função exportarRelatorio não está disponível';
                    resultDiv.className = 'log error';
                }
                
            } catch (error) {
                resultDiv.innerHTML = `❌ Erro no teste: ${error.message}`;
                resultDiv.className = 'log error';
            }
        }
        
        function testFiltros() {
            const resultDiv = document.getElementById('filtrosTestResult');
            resultDiv.innerHTML = '';
            
            try {
                // Testar filtros
                if (typeof aplicarFiltrosSelects === 'function') {
                    resultDiv.innerHTML = '✅ Função aplicarFiltrosSelects está disponível<br>';
                    resultDiv.innerHTML += '📝 Testando aplicação de filtros...<br>';
                    
                    try {
                        aplicarFiltrosSelects();
                        resultDiv.innerHTML += '✅ Filtros aplicados sem erros';
                    } catch (error) {
                        resultDiv.innerHTML += `❌ Erro ao aplicar filtros: ${error.message}`;
                    }
                    
                    resultDiv.className = 'log success';
                } else {
                    resultDiv.innerHTML = '❌ Função aplicarFiltrosSelects não está disponível';
                    resultDiv.className = 'log error';
                }
                
            } catch (error) {
                resultDiv.innerHTML = `❌ Erro no teste: ${error.message}`;
                resultDiv.className = 'log error';
            }
        }
        
        // Verificar status quando a página carrega
        window.addEventListener('load', () => {
            console.log('🚀 Página de teste carregada');
            console.log('🔍 Verificando funções disponíveis...');
            
            // Verificar se as funções estão disponíveis
            const functions = [
                'aplicarFiltrosSelects',
                'atualizarRelatorios', 
                'exportarRelatorio',
                'alterarPeriodoGrafico',
                'showQuickActions'
            ];
            
            functions.forEach(funcName => {
                if (typeof window[funcName] === 'function') {
                    console.log(`✅ ${funcName}: Disponível`);
                } else {
                    console.error(`❌ ${funcName}: Não disponível`);
                }
            });
        });
    </script>
</body>
</html>
