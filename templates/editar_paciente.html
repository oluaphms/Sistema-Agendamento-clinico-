{% extends "base.html" %}

{% block content %}
<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h5 class="card-title mb-0">
          <i class="bi bi-person-fill-gear me-2"></i>
          Editar Paciente - {{ paciente.nome }}
        </h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">
                <i class="bi bi-person me-1"></i>Nome Completo *
              </label>
              <input class="form-control" name="nome" value="{{ paciente.nome }}" placeholder="Digite o nome completo" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">
                <i class="bi bi-telephone me-1"></i>Telefone
              </label>
              <input class="form-control" name="telefone" value="{{ paciente.telefone or '' }}" placeholder="(11) 99999-9999">
            </div>
            <div class="col-md-6">
              <label class="form-label">
                <i class="bi bi-envelope me-1"></i>E-mail
              </label>
              <input type="email" class="form-control" name="email" value="{{ paciente.email or '' }}" placeholder="email@exemplo.com">
            </div>
            <div class="col-md-6">
              <label class="form-label">
                <i class="bi bi-calendar me-1"></i>Data de Nascimento
              </label>
              <input type="date" class="form-control" name="nascimento" value="{{ paciente.data_nascimento or '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label">
                <i class="bi bi-shield-check me-1"></i>Convênio
              </label>
              <input class="form-control" name="convenio" value="{{ paciente.convenio or '' }}" placeholder="Nome do convênio">
            </div>
            <div class="col-12">
              <label class="form-label">
                <i class="bi bi-chat-text me-1"></i>Observações
              </label>
              <textarea class="form-control" name="observacoes" rows="3" placeholder="Observações importantes sobre o paciente...">{{ paciente.observacoes or '' }}</textarea>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-2"></i>Salvar Alterações
            </button>
            <a href="{{ url_for('pacientes') }}" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-2"></i>Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
