{% extends "base.html" %}
{% block content %}
<h3 class="mb-3">Prontuário — {{ paciente.nome }}</h3>
<form method="POST" class="card p-3 mb-4">
  <div class="row g-2">
    <div class="col-md-3"><input type="date" name="data" class="form-control" value="{{ '%Y-%m-%d'|format }}"></div>
    <div class="col-md-9"><textarea class="form-control" name="anotacao" rows="3" placeholder="Anotações"></textarea></div>
  </div>
  <div class="mt-2"><button class="btn btn-primary">Adicionar</button></div>
</form>
<table class="table table-sm">
  <thead><tr><th>Data</th><th>Anotação</th></tr></thead>
  <tbody>
    {% for r in registros %}
      <tr><td>{{ r.data }}</td><td>{{ r.anotacao }}</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
