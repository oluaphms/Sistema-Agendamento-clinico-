<!-- Novo Menu Lateral Inovador - Sidebar Flutuante com Efeitos Avançados -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="sidebar" id="sidebar">
  <!-- Header do Sidebar com Avatar -->
  <div class="sidebar-header">
    <div class="user-profile">
      <div class="avatar-container">
        <div class="avatar" id="userAvatar">
          <img src="/static/icons/default-avatar.svg" alt="Usuário">
          <div class="status-indicator" id="statusIndicator"></div>
        </div>
        <div class="user-info">
          <h4 class="user-name" id="userName">Usuário</h4>
          <span class="user-role" id="userRole">Recepção</span>
        </div>
      </div>
    </div>
    
    <!-- Botão de Toggle do Menu -->
    <button class="sidebar-toggle" id="sidebarToggle" title="Recolher/Expandir menu">
      <i class="bi bi-chevron-left"></i>
    </button>
  </div>

  <!-- Barra de Busca Global -->
  <div class="search-container">
    <div class="search-box">
      <i class="bi bi-search search-icon"></i>
      <input type="text" 
             id="globalSearch" 
             placeholder="Buscar pacientes, profissionais, serviços..."
             class="search-input">
      <button class="search-clear" id="searchClear" title="Limpar busca">
        <i class="bi bi-x"></i>
      </button>
    </div>
  </div>

  <!-- Mini Dashboard (visível apenas quando expandido) -->
  <div class="mini-dashboard" id="miniDashboard">
    <div class="dashboard-card">
      <div class="card-icon">
        <i class="bi bi-calendar-check"></i>
      </div>
      <div class="card-content">
        <h5>Próximos Agendamentos</h5>
        <span class="card-value" id="nextAppointments">0</span>
      </div>
    </div>
    
    <div class="dashboard-card">
      <div class="card-icon">
        <i class="bi bi-currency-dollar"></i>
      </div>
      <div class="card-content">
        <h5>Receita do Dia</h5>
        <span class="card-value" id="dailyRevenue">R$ 0,00</span>
      </div>
    </div>
  </div>

  <!-- Navegação Principal -->
  <nav class="sidebar-nav">
    <ul class="nav-list">
      <!-- Menu vazio - todos os itens foram removidos -->
    </ul>
  </nav>

  <!-- Rodapé do Sidebar -->
  <div class="sidebar-footer">
    <!-- Botão de Modo Escuro/Claro -->
    <button class="theme-toggle-btn" id="sidebarThemeToggle" title="Alternar tema">
      <i class="bi bi-moon-fill" id="sidebarThemeIcon"></i>
    </button>
    
    <!-- Botão de Sair -->
    <a href="/logout" class="logout-btn" title="Sair do sistema">
      <i class="bi bi-box-arrow-right"></i>
      <span class="logout-text">Sair</span>
    </a>
  </div>
</div>

<!-- Botão de Abertura do Menu (Floating Action Button) -->
<button class="sidebar-fab" id="sidebarFab" title="Abrir menu lateral">
  <i class="bi bi-list"></i>
</button>

<!-- Sistema de Partículas Animadas -->
<div class="particles-container" id="particlesContainer"></div>

<!-- CSS do Sidebar -->
<link rel="stylesheet" href="/static/css/sidebar_menu.css">

<!-- JavaScript do Sidebar -->
<script src="/static/js/sidebar_menu.js"></script>

<!-- Script para detectar informações do usuário -->
<script>
// Função para detectar informações do usuário da sessão
function detectUserInfo() {
  try {
    // Tentar detectar informações do usuário da sessão atual
    const userName = document.querySelector('.user-name')?.textContent;
    const userRole = document.querySelector('.user-role')?.textContent;
    
    if (userName && userName !== 'Usuário') {
      document.getElementById('userName').textContent = userName;
    }
    
    if (userRole && userRole !== 'Recepção') {
      document.getElementById('userRole').textContent = userRole;
    }
    
    // Tentar detectar avatar se existir
    const existingAvatar = document.querySelector('.avatar img');
    if (existingAvatar && existingAvatar.src && !existingAvatar.src.includes('default-avatar')) {
      document.querySelector('#userAvatar img').src = existingAvatar.src;
    }
    
  } catch (error) {
    console.warn('Erro ao detectar informações do usuário:', error);
  }
}

// Executar quando o DOM estiver pronto
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(detectUserInfo, 100);
});

// Executar também quando o sidebar for inicializado
window.addEventListener('sidebarReady', detectUserInfo);
</script>
