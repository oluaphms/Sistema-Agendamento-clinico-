{% extends "base.html" %}

{% block content %}
<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h5 class="card-title mb-0">
          <i class="bi bi-person-badge-fill me-2"></i>
          Editar Profissional - {{ profissional.nome }}
        </h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Nome *</label>
              <input class="form-control" name="nome" value="{{ profissional.nome }}" placeholder="Nome" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Especialidade</label>
              <input class="form-control" name="especialidade" value="{{ profissional.especialidade or '' }}" placeholder="Especialidade">
            </div>
            <div class="col-md-2">
              <label class="form-label">Telefone</label>
              <input class="form-control" name="telefone" value="{{ profissional.telefone or '' }}" placeholder="Telefone">
            </div>
            <div class="col-md-3">
              <label class="form-label">E-mail</label>
              <input class="form-control" name="email" value="{{ profissional.email or '' }}" placeholder="E-mail">
            </div>
            <div class="col-12">
              <label class="form-label">Horários (JSON) – ex: {"segunda": ["08:00-12:00","14:00-18:00"]}</label>
              <textarea class="form-control" name="horarios" rows="3">{{ profissional.horarios or '{}' }}</textarea>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-2"></i>Salvar Alterações
            </button>
            <a href="{{ url_for('profissionais') }}" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-2"></i>Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
