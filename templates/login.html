<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Sistema Clínica</title>
  
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  
  <style>
    :root {
      --primary-color: #0d6efd;
      --secondary-color: #6c757d;
      --success-color: #198754;
      --info-color: #0dcaf0;
      --warning-color: #ffc107;
      --danger-color: #dc3545;
      --light-color: #f8f9fa;
      --dark-color: #212529;
    }

    /* Dark Mode Variables */
    [data-bs-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --border-color: #404040;
      --card-bg: #2d2d2d;
    }

    [data-bs-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --border-color: #dee2e6;
      --card-bg: #ffffff;
    }

    body {
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 1.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .login-header {
      background: linear-gradient(135deg, var(--primary-color) 0%, #0056b3 100%);
      padding: 3rem 2rem 2rem;
      text-align: center;
      color: white;
    }

    .login-logo {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }

    .login-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0;
    }

    .login-subtitle {
      font-size: 1rem;
      opacity: 0.9;
      margin: 0.5rem 0 0;
    }

    .login-body {
      padding: 2.5rem 2rem;
    }

    .form-control {
      background: var(--bg-primary);
      border: 2px solid var(--border-color);
      border-radius: 0.75rem;
      color: var(--text-primary);
      font-size: 1rem;
      padding: 1rem 1rem;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background: var(--bg-primary);
      border-color: var(--primary-color);
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
      color: var(--text-primary);
    }

    .form-control::placeholder {
      color: var(--text-secondary);
    }

    .form-label {
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .btn {
      border-radius: 0.75rem;
      font-weight: 600;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      transition: all 0.3s ease;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-color) 0%, #0056b3 100%);
      box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(13, 110, 253, 0.4);
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--secondary-color) 0%, #5a6268 100%);
      box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
    }

    .btn-warning {
      background: linear-gradient(135deg, var(--warning-color) 0%, #e0a800 100%);
      box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
      color: var(--dark-color);
    }

    .btn-warning:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
      color: var(--dark-color);
    }



    .alert {
      border-radius: 0.75rem;
      border: none;
      font-weight: 500;
    }

    .alert-danger {
      background: rgba(220, 53, 69, 0.1);
      color: #dc3545;
      border: 1px solid rgba(220, 53, 69, 0.2);
    }

    .alert-success {
      background: rgba(25, 135, 84, 0.1);
      color: #198754;
      border: 1px solid rgba(25, 135, 84, 0.2);
    }

    .theme-toggle {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text-secondary);
      z-index: 1000;
    }

    .theme-toggle:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      transform: scale(1.1);
    }

    @media (max-width: 576px) {
      body {
        padding: 1rem;
      }
      
      .login-header {
        padding: 2rem 1.5rem 1.5rem;
      }
      
      .login-body {
        padding: 2rem 1.5rem;
      }
      
      .login-logo {
        font-size: 2.5rem;
      }
      
      .login-title {
        font-size: 1.5rem;
      }
    }

    /* Animations */
    .fade-in {
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { 
        opacity: 0; 
        transform: translateY(30px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }

    .slide-up {
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from { 
        opacity: 0; 
        transform: translateY(50px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }
  </style>
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" title="Alternar tema">
    <i class="bi bi-sun-fill" id="themeIcon"></i>
  </button>

  <div class="login-container">
    <div class="login-card fade-in">
      <div class="login-header">
        <i class="bi bi-shield-lock-fill login-logo"></i>
        <h1 class="login-title">Clínica</h1>
        <p class="login-subtitle">Faça login para continuar</p>
      </div>
      
      <div class="login-body slide-up">
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
              <i class="bi bi-{{ 'check-circle' if cat == 'success' else 'exclamation-circle' }} me-2"></i>
              {{ msg }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- Mensagens de Erro -->
        {% if erro %}
          <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle me-2"></i>
            {{ erro }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endif %}

        <form method="POST" id="loginForm">
          <!-- CPF -->
          <div class="mb-3">
            <label for="cpf" class="form-label">
              <i class="bi bi-person-badge me-2"></i>CPF
            </label>
            <input 
              type="text" 
              class="form-control" 
              id="cpf" 
              name="cpf" 
              placeholder="Digite seu CPF"
              required
              maxlength="14"
              autocomplete="off"
            >
          </div>

          <!-- Senha -->
          <div class="mb-4">
            <label for="senha" class="form-label">
              <i class="bi bi-lock me-2"></i>Senha
            </label>
            <input 
              type="password" 
              class="form-control" 
              id="senha" 
              name="senha" 
              placeholder="Digite sua senha"
              required
              autocomplete="current-password"
            >
          </div>



          <!-- Botões -->
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>
              Entrar no Sistema
            </button>
            
            <button type="button" class="btn btn-warning" onclick="showEsqueciSenha()">
              <i class="bi bi-key me-2"></i>
              🔑 Esqueci a senha
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
  
  <script>
    // Theme Toggle
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const html = document.documentElement;
    
    // Load saved theme (dark as default)
    const savedTheme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-bs-theme', savedTheme);
    updateThemeIcon(savedTheme);
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      html.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    });
    
    function updateThemeIcon(theme) {
      if (theme === 'dark') {
        themeIcon.className = 'bi bi-moon-fill';
      } else {
        themeIcon.className = 'bi bi-sun-fill';
      }
    }

    // CPF Input Mask
    const cpfInput = document.getElementById('cpf');
    cpfInput.addEventListener('input', function(e) {
      let value = e.target.value.replace(/\D/g, '');
      
      if (value.length <= 11) {
        value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        value = value.replace(/(\d{3})(\d{3})(\d{3})/, '$1.$2.$3');
        value = value.replace(/(\d{3})(\d{3})/, '$1.$2');
        value = value.replace(/(\d{3})/, '$1');
      }
      
      e.target.value = value;
    });

    // Form Validation
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
      const senha = document.getElementById('senha').value;
      
      if (cpf.length !== 11) {
        e.preventDefault();
        Swal.fire({
          icon: 'error',
          title: 'CPF Inválido',
          text: 'O CPF deve ter 11 dígitos.',
          confirmButtonColor: '#0d6efd'
        });
        return false;
      }
      
      if (senha.length < 3) {
        e.preventDefault();
        Swal.fire({
          icon: 'error',
          title: 'Senha Muito Curta',
          text: 'A senha deve ter pelo menos 3 caracteres.',
          confirmButtonColor: '#0d6efd'
        });
        return false;
      }
    });

    // Modal Functions

    function showEsqueciSenha() {
      // Redireciona para a tela de recuperação de senha
      window.location.href = '/recuperar-senha';
    }

    // Auto-focus no campo CPF
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('cpf').focus();
    });
  </script>
</body>
</html>
