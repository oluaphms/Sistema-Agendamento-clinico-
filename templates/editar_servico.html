{% extends "base.html" %}

{% block content %}
<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h5 class="card-title mb-0">
          <i class="bi bi-tools me-2"></i>
          Editar Serviço - {{ servico.nome }}
        </h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-5">
              <label class="form-label">Nome do Serviço *</label>
              <input class="form-control" name="nome" value="{{ servico.nome }}" placeholder="Nome do serviço" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Duração (min) *</label>
              <input type="number" class="form-control" name="duracao_min" value="{{ servico.duracao_min }}" placeholder="Duração (min)" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Preço *</label>
              <input type="number" step="0.01" class="form-control" name="preco" value="{{ servico.preco }}" placeholder="Preço" required>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-2"></i>Salvar Alterações
            </button>
            <a href="{{ url_for('servicos') }}" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-2"></i>Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
