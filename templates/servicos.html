{% extends "base.html" %}
{% block content %}

<form method="POST" class="card p-3 mb-4">
  <div class="row g-3">
    <div class="col-md-5"><input class="form-control" name="nome" placeholder="Nome do serviço" required></div>
    <div class="col-md-3"><input type="number" class="form-control" name="duracao_min" placeholder="Duração (min)" required></div>
    <div class="col-md-3"><input type="number" step="0.01" class="form-control" name="preco" placeholder="Preço" required></div>
  </div>
  <div class="mt-3"><button class="btn btn-primary">Salvar</button></div>
</form>
<table class="table table-hover">
  <thead><tr><th>Serviço</th><th>Duração</th><th>Preço</th><th>Ações</th></tr></thead>
  <tbody>
    {% for s in servicos %}
      <tr> 
        <td>{{ s.nome }}</td>
        <td>{{ s.duracao_min }} min</td>
        <td>R$ {{ '%.2f'|format(s.preco) }}</td>
        <td>
          <a class="btn btn-sm btn-outline-primary" href="{{ url_for('editar_servico', servico_id=s.id) }}">Editar</a>
          <form method="POST" action="{{ url_for('excluir_servico', servico_id=s.id) }}" style="display:inline">
            <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Confirmar exclusão de {{ s.nome }}?')">Excluir</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
