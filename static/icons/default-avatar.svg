<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fundo -->
  <circle cx="50" cy="50" r="50" fill="url(#avatarGradient)" opacity="0.1"/>
  
  <!-- Cabeça -->
  <circle cx="50" cy="35" r="18" fill="url(#avatarGradient)"/>
  
  <!-- Corpo -->
  <path d="M 20 85 Q 20 65 50 65 Q 80 65 80 85 Z" fill="url(#avatarGradient)"/>
  
  <!-- Olhos -->
  <circle cx="44" cy="32" r="3" fill="white"/>
  <circle cx="56" cy="32" r="3" fill="white"/>
  
  <!-- Pupilas -->
  <circle cx="44" cy="32" r="1.5" fill="#4f46e5"/>
  <circle cx="56" cy="32" r="1.5" fill="#4f46e5"/>
  
  <!-- Sorriso -->
  <path d="M 38 40 Q 50 48 62 40" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Destaque -->
  <circle cx="35" cy="25" r="4" fill="white" opacity="0.3"/>
