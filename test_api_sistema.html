<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste das APIs do Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Teste das APIs do Sistema</h1>
        
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Verificar Sistema</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-primary" onclick="testarVerificarSistema()">
                            <i class="bi bi-check-circle"></i> Testar
                        </button>
                        <div id="resultadoVerificar" class="mt-3"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Limpar Cache</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-success" onclick="testarLimparCache()">
                            <i class="bi bi-trash"></i> Testar
                        </button>
                        <div id="resultadoLimparCache" class="mt-3"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Gerar Relatório</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-info" onclick="testarGerarRelatorio()">
                            <i class="bi bi-file-text"></i> Testar
                        </button>
                        <div id="resultadoRelatorio" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Log de Testes</h5>
                    </div>
                    <div class="card-body">
                        <div id="logTestes" class="border p-3 bg-light" style="max-height: 400px; overflow-y: auto;">
                            <p class="text-muted">Aguardando testes...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function logTeste(mensagem, tipo = 'info') {
            const logDiv = document.getElementById('logTestes');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `mb-2 p-2 border-start border-${tipo === 'success' ? 'success' : tipo === 'error' ? 'danger' : 'info'} border-3 ps-3`;
            logEntry.innerHTML = `<strong>[${timestamp}]</strong> ${mensagem}`;
            logDiv.appendChild(logEntry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function testarVerificarSistema() {
            const resultadoDiv = document.getElementById('resultadoVerificar');
            resultadoDiv.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div> Testando...';
            
            try {
                const response = await fetch('/api/sistema/verificar');
                const data = await response.json();
                
                if (response.ok) {
                    resultadoDiv.innerHTML = '<div class="alert alert-success">✅ API funcionando!</div>';
                    logTeste('✅ Verificar Sistema: API funcionando', 'success');
                    console.log('Dados da verificação:', data);
                } else {
                    resultadoDiv.innerHTML = `<div class="alert alert-danger">❌ Erro: ${data.error || 'Erro desconhecido'}</div>`;
                    logTeste(`❌ Verificar Sistema: ${data.error || 'Erro desconhecido'}`, 'error');
                }
            } catch (error) {
                resultadoDiv.innerHTML = `<div class="alert alert-danger">❌ Erro de conexão: ${error.message}</div>`;
                logTeste(`❌ Verificar Sistema: Erro de conexão - ${error.message}`, 'error');
            }
        }

        async function testarLimparCache() {
            const resultadoDiv = document.getElementById('resultadoLimparCache');
            resultadoDiv.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div> Testando...';
            
            try {
                const response = await fetch('/api/sistema/limpar-cache');
                const data = await response.json();
                
                if (response.ok) {
                    resultadoDiv.innerHTML = '<div class="alert alert-success">✅ API funcionando!</div>';
                    logTeste('✅ Limpar Cache: API funcionando', 'success');
                    console.log('Dados da limpeza:', data);
                } else {
                    resultadoDiv.innerHTML = `<div class="alert alert-danger">❌ Erro: ${data.error || 'Erro desconhecido'}</div>`;
                    logTeste(`❌ Limpar Cache: ${data.error || 'Erro desconhecido'}`, 'error');
                }
            } catch (error) {
                resultadoDiv.innerHTML = `<div class="alert alert-danger">❌ Erro de conexão: ${error.message}</div>`;
                logTeste(`❌ Limpar Cache: Erro de conexão - ${error.message}`, 'error');
            }
        }

        async function testarGerarRelatorio() {
            const resultadoDiv = document.getElementById('resultadoRelatorio');
            resultadoDiv.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div> Testando...';
            
            try {
                const response = await fetch('/api/sistema/relatorio');
                
                if (response.ok) {
                    resultadoDiv.innerHTML = '<div class="alert alert-success">✅ API funcionando!</div>';
                    logTeste('✅ Gerar Relatório: API funcionando', 'success');
                    
                    // Verificar o tipo de conteúdo
                    const contentType = response.headers.get('content-type');
                    const contentDisposition = response.headers.get('content-disposition');
                    
                    let fileName = 'relatorio-sistema-teste';
                    let fileType = 'arquivo';
                    
                    if (contentType && contentType.includes('application/pdf')) {
                        fileName += '.pdf';
                        fileType = 'PDF';
                    } else if (contentType && contentType.includes('text/csv')) {
                        fileName += '.csv';
                        fileType = 'CSV';
                    } else if (contentDisposition && contentDisposition.includes('.pdf')) {
                        fileName += '.pdf';
                        fileType = 'PDF';
                    } else {
                        fileName += '.pdf';
                        fileType = 'PDF';
                    }
                    
                    // Tentar baixar o arquivo
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    
                    logTeste(`📄 Relatório ${fileType} baixado com sucesso`, 'success');
                } else {
                    const data = await response.json();
                    resultadoDiv.innerHTML = `<div class="alert alert-danger">❌ Erro: ${data.error || 'Erro desconhecido'}</div>`;
                    logTeste(`❌ Gerar Relatório: ${data.error || 'Erro desconhecido'}`, 'error');
                }
            } catch (error) {
                resultadoDiv.innerHTML = `<div class="alert alert-danger">❌ Erro de conexão: ${error.message}</div>`;
                logTeste(`❌ Gerar Relatório: Erro de conexão - ${error.message}`, 'error');
            }
        }

        // Testar todas as APIs ao carregar a página
        window.addEventListener('load', () => {
            logTeste('🚀 Página carregada, APIs prontas para teste', 'info');
        });
    </script>
</body>
</html>
