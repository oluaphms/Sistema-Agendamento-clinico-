<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Relatórios - Funções Imediatas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Teste - Funções Imediatas</h1>
        
        <div class="row">
            <div class="col-md-6">
                <h3>Teste Imediato</h3>
                <button class="btn btn-primary mb-2" onclick="testImmediate()">
                    Testar Funções Imediatamente
                </button>
                <br>
                <button class="btn btn-success mb-2" onclick="atualizarRelatorios()">
                    Atualizar Relatórios
                </button>
                <br>
                <button class="btn btn-info mb-2" onclick="exportarRelatorio('csv')">
                    Exportar CSV
                </button>
                <br>
                <button class="btn btn-warning mb-2" onclick="aplicarFiltrosSelects()">
                    Aplicar Filtros
                </button>
            </div>
            
            <div class="col-md-6">
                <h3>Status das Funções</h3>
                <div id="status" class="border p-3">
                    <div class="text-info">Verificando...</div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <h3>Console Output</h3>
                <div id="console" class="border p-3 bg-dark text-light" style="height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;">
                    Aguardando output do console...
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Interceptar console.log para mostrar na tela
        const originalLog = console.log;
        const consoleDiv = document.getElementById('console');
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.join(' ');
            const timestamp = new Date().toLocaleTimeString();
            consoleDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };
        
        function testImmediate() {
            console.log('=== TESTE IMEDIATO ===');
            
            const functions = [
                'atualizarRelatorios',
                'exportarRelatorio', 
                'aplicarFiltrosSelects',
                'showToast'
            ];
            
            functions.forEach(funcName => {
                if (typeof window[funcName] === 'function') {
                    console.log(`✅ ${funcName}: OK`);
                } else {
                    console.log(`❌ ${funcName}: NÃO DEFINIDA`);
                }
            });
            
            updateStatus();
        }
        
        function updateStatus() {
            const statusDiv = document.getElementById('status');
            let html = '<h4>Status das Funções:</h4>';
            
            const functions = [
                'atualizarRelatorios',
                'exportarRelatorio', 
                'aplicarFiltrosSelects',
                'showToast'
            ];
            
            functions.forEach(funcName => {
                if (typeof window[funcName] === 'function') {
                    html += `<div class="text-success">✅ ${funcName}: OK</div>`;
                } else {
                    html += `<div class="text-danger">❌ ${funcName}: NÃO DEFINIDA</div>`;
                }
            });
            
            statusDiv.innerHTML = html;
        }
        
        // Verificar funções após carregamento
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Página carregada, verificando funções...');
            
            // Aguardar um pouco e verificar
            setTimeout(() => {
                testImmediate();
            }, 500);
        });
    </script>
    
    <!-- Carregar relatorios.js -->
    <script src="/static/js/relatorios.js"></script>
</body>
</html>
